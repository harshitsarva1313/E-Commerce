<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../Home/style.css">
    <link rel="stylesheet" href="./style.css">
    <title>My Orders - Store</title>
</head>
<body>
    <!-- Navigation: Back + Profile -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="../Home/index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
        <div class="user-section">
            <span id="userInfo" class="user-info hidden"></span>
            <button id="profileBtn" class="profile-btn hidden">
                <i class="fa-solid fa-user-edit"></i> Edit Profile
            </button>
            <span id="loginPrompt" class="login-prompt">
                <a href="../Home/index.html#loginBtn">Login to view orders</a>
            </span>
        </div>
    </nav>

    <!-- Main Content: Tabs for Current/Completed -->
    <main class="orders-container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="current">Current Orders</button>
            <button class="tab-btn" data-tab="completed">Completed Orders</button>
        </div>

        <!-- Current Orders Tab -->
        <section id="current-tab" class="tab-content active">
            <div id="currentOrders" class="orders-list"></div>
            <div id="noCurrent" class="empty-state hidden">
                <i class="fa-solid fa-clock fa-3x"></i>
                <h3>No current orders</h3>
                <p>Check back later for updates</p>
            </div>
        </section>

        <!-- Completed Orders Tab -->
        <section id="completed-tab" class="tab-content">
            <div id="completedOrders" class="orders-list"></div>
            <div id="noCompleted" class="empty-state hidden">
                <i class="fa-solid fa-check-circle fa-3x"></i>
                <h3>No completed orders</h3>
                <p>Your order history will appear here</p>
            </div>
        </section>
    </main>

    <!-- Profile Edit Mini Window - Like Login -->
    <div id="modalBackdropProfile" class="hidden"></div>
    <div id="profileMiniWindow" class="hidden">
        <div id="profileMiniTop">
            <div id="profileCancelBtn"></div>
            <div id="profileTitle"><i class="fa-solid fa-user-edit"></i> Edit Profile</div>
        </div>
        <div id="profileMiniBottom">
            <table>
                <tr>
                    <th><i class="fa-solid fa-envelope"></i> Email *:</th>
                    <td><input type="email" id="editEmail" required></td>
                </tr>
                <tr>
                    <th><i class="fa-solid fa-user"></i> Name:</th>
                    <td><input type="text" id="editName"></td>
                </tr>
                <tr>
                    <th><i class="fa-solid fa-phone"></i> Phone:</th>
                    <td><input type="tel" id="editPhone"></td>
                </tr>
                <tr>
                    <th><i class="fa-solid fa-map-marker-alt"></i> Address *:</th>
                    <td><textarea id="editAddress" rows="3" required style="width:100%; padding:0.75rem; border:2px solid var(--border-color); border-radius:0.375rem; resize:vertical;"></textarea></td>
                </tr>
                <tr>
                    <th>
                        <div style="display:flex; gap:0.5rem;">
                            <button type="button" id="resetProfile" class="btn-secondary" style="flex:1; padding:0.75rem;">Reset</button>
                            <button type="submit" id="saveProfileBtn" class="btn-primary" style="flex:1; padding:0.75rem;">Save</button>
                        </div>
                    </th>
                </tr>
            </table>
        </div>
    </div>

    <!-- Order Detail/Bill Modal -->
    <div id="orderModal" class="modal-overlay hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 id="orderTitle">Order Details</h2>
                <button id="closeOrder" class="close-btn">&times;</button>
            </div>
            <div id="orderContent"></div>
        </div>
    </div>

    <!-- Delivery Message Modal -->
    <div id="messageModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Message Delivery Person</h2>
                <button id="closeMessage" class="close-btn">&times;</button>
            </div>
            <form id="messageForm">
                <div class="form-group">
                    <label for="deliveryPhone">Call Delivery Person</label>
                    <a id="deliveryPhone" href="tel:"></a>
                </div>
                <div class="form-group">
                    <label for="messageText">Send Message</label>
                    <textarea id="messageText" rows="4" placeholder="Type your message..."></textarea>
                </div>
                <button type="submit" class="btn-primary full-width">Send Message</button>
            </form>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
